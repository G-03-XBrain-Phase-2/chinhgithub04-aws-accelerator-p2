apiVersion: apps/v1
kind: Deployment
metadata:
  name: load
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load
  template:
    metadata:
      labels:
        app: load
    spec:
      containers:
      - name: load
        image: busybox
        command:
        - sh
        - -c
        - "while true; do wget -qO- http://api:8080/ || true; sleep 0.1; done"
